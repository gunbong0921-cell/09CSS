<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .topleft{position: absolute;top: 10px;left: 10px;}
    .bottomleft{position: relative;top: -40px;left: 10px;}
    .centered{
        position: absolute; top: 40%;left: 40%;
    }
    .topright{position: absolute;top: 10px;right: 10px;}
    .bottomright{position: absolute;bottom: 40px;right: 10px;}

  </style>
</head>
<body>
      <style>
    .container {
        position: relative;
    }
    img { 
        width: 100%;
        height: auto;
        opacity: 0.3;
    }
    </style>
    <div class="container">
        <img src="./images/img_5terre_wide.jpg" width="1000" height="300">
        <div class="topleft">Top Left</div>
        <div class="topright">Top Right</div>
        <div class="centered">centered</div>
        <div class="bottomleft">bottom Left</div>
        <div class="bottomright">bottom Right</div>
    </div> 

</body>
</html>
