<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>    
    <h2>테이블1 - HTML속성</h2>
    <!-- 
    cellspacing : 셀과 셀 사이의 간격 설정
    cellpadding : 셀과 내부 컨텐츠 사이의 간격 설정

    테이블의 배경색을 gray로 설정한 후 셀 사이의 간격을 1로 설정해서 표와 같은 형태로 출력  
    -->
    <table id="table1" border="0" cellspacing="1" cellpadding="5" width="400" 
        bgcolor="gray">
        <tr bgcolor="silver">
            <th>이름</th>
            <th>나이</th>
            <th>몸무게</th>
        </tr>
        <tr bgcolor="white">
            <td>이순신</td>
            <td>30세</td>
            <td>77kg</td>
        </tr>       
        <tr bgcolor="white">
            <td>홍길동</td>
            <td>25세</td>
            <td>65kg</td>
        </tr>       
    </table>
    
    <h2>테이블2 - CSS속성</h2>
    <style>
    #table2{
        width: 400px;
        border: 1px solid gray;
        /*
        테이블의 테두리를 합치거나 분리할때 사용하는 속성
        collapse
        sparate
        */       
        border-collapse: collapse; /* separate */
    }   
    /* th태그는 볼드체와 가운데정렬이 기본 스타일로 지정됨 */
    #table2 th{
        background-color: silver;
    }
    #table2 th, #table2 td{
        border: 1px solid gray;
        padding: 5px;
        /* td태그는 가운데 정렬을 위해 속성을 추가해야 한다. */
        text-align: center;
    }
    </style>
    <table id="table2">
        <tr>
            <th>이름</th>
            <th>나이</th>
            <th>몸무게</th>
        </tr>
        <tr>
            <td>이순신</td>
            <td>30세</td>
            <td>77kg</td>
        </tr>       
        <tr>
            <td>홍길동</td>
            <td>25세</td>
            <td>65kg</td>
        </tr>       
    </table>
</body>
</html>
