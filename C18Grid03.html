<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C18Grid03.html</title>
  <style>
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .item {
      background-color: #4caf50;
      color: white;
      font-size: 24px;
      text-align: center;
      padding: 20px;
    }
    /* 현재 위치부터 오른쪽으로 2칸 합침 */
    .colMerge {
      grid-column: span 2;
    }
    .rowMerge {
      grid-row: span 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h2>grid-영역합치기2(span N)</h2>
  <div class="container">
    <div class="item colmerge1">A</div>
    <div class="item">B</div>
    <div class="item rowMerge">C</div>
    <div class="item">D</div>
    <div class="item">E</div>
    <div class="item">F</div>
    <div class="item">G</div>
  </div>
</body>
</html>
