<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* div 상자의 공통속성 정의 */
        div{
            width:100px; height:100px; text-align:center;
            background-color:yellow; line-height:100px;
            border:3px solid gray;
        }
        .c1{background-color: red;}
        .c2{background-color: green;}
        .c3{background-color: blue;}
    </style>
</head>
<body>
    <h2>2D transform</h2>
    <div>
        기본상자
    </div>
    
    <h3>translate() - 이동</h3>
    <style>
        /*
        translate(x축, y축) : 수평방향 혹은 수직방향으로 요소를 이동한다. 아래의 속성값은
          translateX(), translateY()로 나눠서 작성할 수 있다.
        */
        .box01{
            transform: translate(100px, 10px);
        }
    </style>    
    <div class="box01 c1">
        box01
    </div>

    <h3>rotate() - 회전</h3>
    <style>
        /*
        retate(각도) : 시계방향으로 주어진 각도만큼 회정. 음수로 설정하면 반시계방향으로 회전함.
        각도는 deg(degree)로 설정한다. 
        */
        .box02{
            transform: translate(300px,0px)
                rotate(90deg);
        }
    </style>
    <div class="box02 c2">
        box02
    </div>

    <h3>scale() - 확대/축소</h3>
    <style>
        /*
        scale(x,y) : 1을 기준으로 크면 확대, 작으면 축소됨. 
        */
        .box03{
            transform: 
                translate(200px,0px)
                scale(2, 1.3);
        }
    </style>
    <div class="box03 c3">
        box03
    </div>

    <h3>skew() - 기울임</h3>    
    <style>
        /*
        skew(x,y) : 엘리먼트를 비스듬하게 변형한다. 양수면 최상단과 우하단을 당기듯 변형. 즉 역슬러쉬 방향
          음수면 좌하단과 우상단을 당기듯 변형. 슬러쉬 방향.
        */       
        .box04{
            transform: 
                translate(100px,0px)
                skew(10deg, -20deg);
        }
    </style>
    <div class="box04 c1">
        box04
    </div>

    <h3>matrix() - 통합적용</h3>        
    <style>
    /*
    matrix는 스케일, 기울임, 이동을 통합적으로 적용한다. 단 skew는 deg를 사용하지 않고 정수값을 사용해야한다.
    형식] matrix(scaleX, skewY, skewX, scaleY, translateX, translateY)
    */  
    .box05{
        transform: matrix(1, -0.5, 0, 1, 300, -50);
    }
    </style>
    <div class="box05 c2">
        box05
    </div>
</body>
</html>
