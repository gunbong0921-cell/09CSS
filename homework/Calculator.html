<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator.html</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      min-height: 100vh;
      background-color: white;
    }

    .calculator {
      width: 450px;
      background-color: #dddddd;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .lcd {
      grid-column: span 4;
      background-color: #70C738;
      color: #333333;
      font-size: 2.2rem;
      font-weight: bold;
      text-align: right;
      padding: 20px 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      min-height: 80px;
      word-break: break-all;
    }

    button {
      border: none;
      border-radius: 8px;
      font-size: 1.25rem;
      font-weight: bold;
      color: white;
      padding: 18px;
      cursor: pointer;
      transition: opacity 0.1s ease;
    }

    button:active {
      opacity: 0.8;
    }

    .btn-utility {
      grid-column: span 2;
      background-color: #7c7c7c;
    }

    .btn-number {
      background-color: #373737;
    }

    .btn-operator {
      background-color: #FA960A;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="grid-container">
      <div class="lcd">123+654</div>

      <button class="btn-utility">BackSpace</button>
      <button class="btn-utility">C</button>


    </div>
  </div>
</body>
</html>
