<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 폼</title>
    <!-- 카카오 우편번호 서비스 스크립트 추가 -->
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            font-size: 13px; 
            color: #333; 
        }
        .regist-container { 
            width: 750px; 
            margin: 20px auto; 
            border: 1px solid #ccc; 
            padding: 20px; 
        }
        .required-text { 
            text-align: right; 
            color: #d9534f; 
            font-weight: bold; 
            margin-bottom: 5px; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            border-top: 2px solid #bbb; 
            border-bottom: 2px solid #bbb; 
        }
        th, td { 
            border: 1px solid #e2e2e2; 
            padding: 10px; 
            text-align: left; 
            vertical-align: middle; 
        }
        th { 
            background-color: #f2f4f7; 
            width: 130px; 
            font-weight: bold; 
        }
        th span { 
            color: red; 
            margin-right: 3px; 
        }
        input[type="text"], input[type="password"], select { 
            height: 25px; 
            border: 1px solid #ccc; 
            padding: 0 5px; 
            box-sizing: border-box; 
            vertical-align: middle; 
        }
        .btn-dark { 
            background-color: #333; 
            color: #fff; 
            border: none; 
            padding: 4px 10px; 
            cursor: pointer; 
            font-size: 12px; 
            height: 25px; 
            vertical-align: middle; 
        }
        .info-desc { 
            color: #888; 
            font-size: 12px; 
            margin-left: 10px; 
        }
        .warn-desc { 
            color: #888; 
            font-size: 12px; 
            margin-top: 5px; 
            display: block; 
        }
        .input-short { width: 60px; }
        .input-medium { width: 150px; }
        .input-long { width: 95%; }
        .btn-group { 
            text-align: center; 
            margin-top: 20px; 
        }
        .btn-submit { 
            background-color: #d9001b; 
            color: white; 
            font-weight: bold; 
            border: none; 
            padding: 10px 30px; 
            font-size: 14px; 
            cursor: pointer; 
            margin-right: 10px; 
        }
        .btn-reset { 
            background-color: #43464b; 
            color: white; 
            font-weight: bold; 
            border: none; 
            padding: 10px 30px; 
            font-size: 14px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div class="regist-container">
    <div class="required-text">* 필수 입력</div>
    
    <form action="/register" method="post" id="registForm">
        <table>
            <!-- 아이디 -->
            <tr>
                <th><span>*</span>아이디</th>
                <td>
                    <input type="text" name="userid" id="userid" class="input-medium" required>
                    <button type="button" class="btn-dark" id="btn-check-id">중복확인</button>
                    <span class="info-desc">+ 4~15자, 첫 영문자, 영문자와 숫자 조합</span>
                </td>
            </tr>
            <!-- 비밀번호 -->
            <tr>
                <th><span>*</span>비밀번호</th>
                <td>
                    <input type="password" name="userpwd" class="input-medium" required>
                </td>
            </tr>
            <!-- 비밀번호 확인 -->
            <tr>
                <th><span>*</span>비밀번호 확인</th>
                <td>
                    <input type="password" name="userpwd_chk" class="input-medium" required>
                    <span class="info-desc">(확인을 위해 다시 입력해 주세요.)</span>
                </td>
            </tr>
            <!-- 이름 -->
            <tr>
                <th><span>*</span>이름</th>
                <td>
                    <input type="text" name="username" class="input-medium" required>
                </td>
            </tr>
            <!-- 생년월일 -->
            <tr>
                <th>생년월일</th>
                <td>
                    <label><input type="radio" name="gender" value="남자" checked> 남자</label>
                    <label><input type="radio" name="gender" value="여자"> 여자</label>
                    <input type="text" name="birth_year" class="input-short" style="margin-left: 15px;"> 년
                    <input type="text" name="birth_month" class="input-short"> 월
                    <input type="text" name="birth_day" class="input-short"> 일
                    <span class="info-desc">(예, 2000년 01월 31일)</span>
                </td>
            </tr>
            <!-- 이메일 -->
            <tr>
                <th><span>*</span>이메일</th>
                <td>
                    <input type="text" name="email1" class="input-medium" required> @
                    <input type="text" name="email2" id="email2" class="input-medium" required>
                    <select name="email_domain" id="email_domain">
                        <option value="">직접 입력</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="naver.com">naver.com</option>
                        <option value="daum.net">daum.net</option>
                    </select>
                    <label style="margin-left:10px;"><input type="radio" name="email_agree" value="수신허용"> 수신허용</label>
                    <label><input type="radio" name="email_agree" value="수신불가" checked> 수신불가</label>
                    <span class="warn-desc">※ hanmail.net은 메일 수신이 어려울 수 있으니 가급적 다른 메일을 이용하시기 바랍니다.</span>
                </td>
            </tr>
            <!-- 주소 -->
            <tr>
                <th>주소</th>
                <td>
                    <div style="margin-bottom: 5px;">
                        <button type="button" class="btn-dark" id="btn-search-addr">주소찾기</button>
                        <input type="text" name="zipcode" id="zipcode" class="input-short" readonly> <span class="info-desc">(우편번호)</span>
                    </div>
                    <div style="margin-bottom: 5px;">
                        <input type="text" name="addr1" id="addr1" class="input-long" readonly>
                    </div>
                    <div>
                        <input type="text" name="addr2" id="addr2" class="input-long"> <span class="info-desc" style="white-space: nowrap;">+ 나머지 주소</span>
                    </div>
                </td>
            </tr>
            <!-- 전화번호 -->
            <tr>
                <th>전화번호</th>
                <td>
                    <input type="text" name="tel1" class="input-short"> -
                    <input type="text" name="tel2" class="input-short"> -
                    <input type="text" name="tel3" class="input-short">
                </td>
            </tr>
            <!-- 휴대전화 -->
            <tr>
                <th><span>*</span>휴대전화</th>
                <td>
                    <input type="text" name="mobile1" class="input-short" required> -
                    <input type="text" name="mobile2" class="input-short" required> -
                    <input type="text" name="mobile3" class="input-short" required>
                    <label style="margin-left: 15px;"><input type="radio" name="sms_agree" value="SMS 수신허용" checked> SMS 수신허용</label>
                    <label><input type="radio" name="sms_agree" value="SMS 수신불가"> SMS 수신불가</label>
                </td>
            </tr>
            <!-- 관심분야 -->
            <tr>
                <th><span>*</span>관심분야</th>
                <td>
                    <select name="interest" style="width: 250px;" required>
                        <option value="">:: 관심분야 선택 ::</option>
                        <option value="개발">웹 개발</option>
                        <option value="디자인">UI/UX 디자인</option>
                        <option value="기획">서비스 기획</option>
                    </select>
                </td>
            </tr>
            <!-- 가입경로 -->
            <tr>
                <th><span>*</span>가입경로</th>
                <td>
                    <select name="join_path" style="width: 250px;" required>
                        <option value="">:: 가입경로 선택 ::</option>
                        <option value="검색">인터넷 검색</option>
                        <option value="지인">지인 추천</option>
                        <option value="광고">SNS 광고</option>
                    </select>
                </td>
            </tr>
        </table>
        
        <div class="btn-group">
            <button type="submit" class="btn-submit">등록하기</button>
            <button type="reset" class="btn-reset" id="btnReset">새로 쓰기</button>
        </div>
    </form>
</div>

<script>
    // === 1. 이메일 토글 자동 입력 로직 ===
    const emailDomainSelect = document.getElementById('email_domain');
    const email2Input = document.getElementById('email2');

    // 셀렉트 박스 변경 이벤트 감지
    emailDomainSelect.addEventListener('change', function() {
        if (this.value === "") {
            // '직접 입력'을 선택하면 기존 내용을 지우고 활성화하여 포커스를 줍니다.
            email2Input.value = "";
            email2Input.readOnly = false;
            email2Input.focus();
        } else {
            // 도메인을 선택하면 해당 값을 텍스트 박스에 주입합니다.
            email2Input.value = this.value;
        }
    });

    // === 2. 카카오 우편번호 및 주소 검색 로직 ===
    document.getElementById('btn-search-addr').addEventListener('click', function() {
        new daum.Postcode({
            oncomplete: function(data) {
                let addr = '';
                if (data.userSelectedType === 'R') {
                    addr = data.roadAddress;
                } else {
                    addr = data.jibunAddress;
                }
                document.getElementById('zipcode').value = data.zonecode;
                document.getElementById('addr1').value = addr;
                document.getElementById('addr2').focus();
            }
        }).open();
    });

    // === 3. 아이디 중복확인 검증 로직 ===
    let isIdChecked = false;
    let checkedId = "";

    document.getElementById('btn-check-id').addEventListener('click', function() {
        const userid = document.getElementById('userid').value.trim();
        if(userid === "") {
            alert("아이디를 입력해주세요.");
            document.getElementById('userid').focus();
            return;
        }

        fetch('/check_id', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userid: userid })
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
            if(data.result === 'success') {
                isIdChecked = true;
                checkedId = userid;
            } else {
                isIdChecked = false;
                checkedId = "";
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('중복확인 중 오류가 발생했습니다.');
        });
    });

    // 아이디 입력 수정 시 중복확인 풀기
    document.getElementById('userid').addEventListener('input', function() {
        if(this.value !== checkedId) {
            isIdChecked = false;
        }
    });

    // 폼 제출 전 최종 체크
    document.getElementById('registForm').addEventListener('submit', function(e) {
        const userid = document.getElementById('userid').value.trim();
        if(!isIdChecked || userid !== checkedId) {
            alert("아이디 중복확인을 해주세요.");
            e.preventDefault();
            document.getElementById('userid').focus();
        }
    });

    // 초기화 버튼 시 검증 상태 리셋
    document.getElementById('btnReset').addEventListener('click', function() {
        isIdChecked = false;
        checkedId = "";
    });
</script>

</body>
</html>
