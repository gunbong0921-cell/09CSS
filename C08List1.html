<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C08List1.html</title>
  <style>
    #topmenu li{
      /* 
      li태그는 기본 속성이 block이지만 display속성을 통해 inline으로 변경할 수 있다.
      그러면 세로형에서 가로형으로 배치가 변경되고, 블릿도 제거된다.
      */
      display: inline;
      /* 박스모델의 우측만 테두리를 설정 */
      border-right: 2px solid gray;
      /* 오른쪽 패딩만 설정해서 구분선과의 간격을 지정 */
      padding-right: 7px;
    }
    /* 메뉴 마지막 부분의 구분선은 필요 없으므로 제거 */
    #topmenu li:last-child{
      border: none;
    }
    /* a태그로 링크가 걸린 텍스트는 꾸밈없이 검은색으로 변경 */
    #topmenu li a{
      text-decoration: none; color: black;
    }
    /* 마우스를 올렸을때 밑줄 및 색깔 변경효과 적용 */
    #topmenu li a:hover{
      text-decoration: underline; color: silver;
    }
    .sport {
      border: 5px solid blue;
      /* 블릿의 모양을 알파벳 대문자로 설정 */
      list-style-type: upper-alpha;
      /* 블릿의 위치 설정. inside와 outside가 있음 */
      list-style-position: inside;
    }
    .sport li {
      border: 1px solid red;
    }
  </style>
</head>
<body>
  <h2>li 태그로 메뉴 구현</h2>
  <!-- fieldest>legend+ul#topmenu>(li>a[href=#])*5 -->
   <fieldset>
    <legend>Top메뉴</legend>
    <ul id="topmenu">
      <li><a href="#">HOME</a></li>
      <li><a href="#">회원가입</a></li>
      <li><a href="#">로그인</a></li>
      <li><a href="#">장바구니</a></li>
      <li><a href="#">고객센터</a></li>
    </ul>
   </fieldset>

   <h2>블릿 위치 변경</h2>
   <fieldset>
    <legend>당신이 가장 좋아하는 스포츠는?</legend>
    <!-- ul.sport>li*5 -->
     123
     <ul class="sport">
      <li>축구</li>
      <li>야구</li>
      <li>배구</li>
      <li>농구</li>
      <li>핸드볼</li>
     </ul>
   </fieldset>
</body>
</html>
