<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C17Flex07-board.html</title>
  <style>
    /*
    전체선택자를 통한 설정. box-sizing으로 border, padding의 영향없이 사이즈를 지정할 수
    있도록 설정함.
    */
    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    /*
    컨테이너를 flex로 설정하고, 주축의 방향을 수직방향으로 결정. 전체 높이를 해당 뷰포트의
    100%로 지정한다.
    */
    .wrapper {
      display: flex; flex-direction: column; height: 100vh;
    }
    /*
    Global Navigation Bar. 페이지 전체에서 공통으로 사용하는 구성
    */
    .gnb {
      background: #333; color: white; padding: 15px;
      text-align: center;
    }
    /*
    lex를 1로 지정하면 웹브라우저의 높이에 맞춰서 늘어남. 0인 경우에는 ㅋㄴ텐츠의 크기만큼만 표시됨.
    내부의 아이템(좌측메뉴와 게시판)은 가로형으로 배치할 것이므로 flex-direction은 생략함.(row가 디폴트값)
    */
    .main {
      flex: 0; display: flex;
    }
    /*
    Local Navigation Bar. 글로번메뉴 하위의 서브메뉴를 표현한다.
    */
    .lnb {
      width: 200px; background: #eee; padding: 20px;
    }
    /*
    섹션. 즉 주 내용이 표시되는 부분
    */
    .content {
      flex: 1; padding: 20px;
    }
    /* 게시판 목록. li태그의 블릿만 제거 */
    .board li {
      padding: 8px; border-bottom: 1px solid #ccc; list-style: none;  
    }
    /* 카피라이트 영역 */
    .footer {
      background: #333; color: white; text-align: center; padding: 10px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header class="gnb">상단 네비게이션</header>
    <div class="main">
      <aside class="Inb">좌측 메뉴</aside>
      <section class="content">
        <h2>게시판</h2>
        <ul class="board">
          <li>1. 게시글 제목</li>
          <li>2. 게시글 제목</li>
          <li>3. 게시글 제목</li>
        </ul>
      </section>
    </div>
    <footer class="footer">ⓒ 2025 MyCompany</footer>
  </div>
</body>
</html>
