<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C17Flex02.html</title>
  <style>
    .container {
      display: flex;
      flex-direction: row;
      justify-content: flex-start; /* 주 축 방향에서 아이템 정렬 방식 */
      border: 2px solid #333; padding: 10px;
    }
    .item {
      width: 60px; height: 60px; background-color: salmon;
      margin: 5px; text-align: center; line-height: 60px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Flexbox-주 축에서 정렬</h2>
  <div class="container">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
  </div>
</body>
</html>
