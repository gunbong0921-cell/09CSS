<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C17Flex02.html</title>
  <style>
    /*
    주축(Main axis) 에서의 아이템 정렬
    justify-content 속성으로 여러가지 형태의 정렬을 할 수 있다.
      flex-start : 시작 지점에 정렬
      flex-end : 끝 지점에 정렬
      center : 가운데 정렬
      space-between : 양끝 정렬, 나머지는 균등 간격
      space-around ; 아이템 주위로 균등 간격
      space-evenly : 아이템 사이의 균등 간격
    */
    .container {
      display: flex;
      flex-direction: row;
      justify-content: space-evenly; /* 주 축 방향에서 아이템 정렬 방식 */
      border: 2px solid #333; padding: 10px;
    }
    .item {
      width: 60px; height: 60px; background-color: salmon;
      margin: 5px; text-align: center; line-height: 60px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Flexbox-주 축에서 정렬</h2>
  <div class="container">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
  </div>
</body>
</html>
